<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B7D3E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/icons/logo.svg">
  <link rel="apple-touch-icon" href="/icons/logo.svg">
  <title>Keep 运动打卡</title>
  <!-- 首屏加载动画 - 纯CSS，零JS依赖，消灭白屏 -->
  <style>
    #app-loading {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      transition: opacity 0.4s ease;
    }
    #app-loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #app-loading img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      animation: loading-pulse 1.6s ease-in-out infinite;
    }
    #app-loading p {
      margin-top: 16px;
      font-size: 14px;
      color: #666;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @keyframes loading-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.7; }
    }
    /* 加载环 */
    #app-loading .spinner {
      margin-top: 20px;
      width: 28px;
      height: 28px;
      border: 3px solid #E8F5EC;
      border-top-color: #1B7D3E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- 首屏加载层 - Vue挂载后由main.js移除 -->
  <div id="app-loading">
    <img src="/icons/logo.svg" alt="Keep">
    <div class="spinner"></div>
    <p>加载中...</p>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
